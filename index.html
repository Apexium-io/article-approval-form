<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apexium Article Approval Home</title>
    <style>
        body {
            margin: 0;
            padding: 30px 15px;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
            color: #222;
            line-height: 1.6;
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            position: relative;
        }

        .nav-tabs a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            padding: 0 12px;
            border-radius: 5px;
            transition: background 0.2s, color 0.2s;
        }

        .nav-tabs a.active,
        .nav-tabs a:focus {
            background: #eaeaea;
            color: #0066cc;
        }

        .notification-dropdown {
            position: relative;
            display: inline-block;
            margin-left: 12px;
        }

        .notification-dropdown span {
            cursor: pointer;
            font-size: 22px;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            left: 100%;
            top: 0;
            background-color: #fff;
            min-width: 320px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            padding: 12px;
            z-index: 100;
            color: #222;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
            margin-left: 8px;
            white-space: pre-line;
        }

        .notification-dropdown.active .dropdown-content {
            display: block;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            min-height: 300px;
        }

        h1 {
            margin-top: 0;
            font-size: 28px;
            color: #111;
        }

        .main-actions {
            margin: 40px 0;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .main-actions a {
            display: inline-block;
            padding: 18px 28px;
            background: #eaeaea;
            color: #0066cc;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.2s;
            border: 1px solid #bbb;
        }

        .main-actions a:hover {
            background: #d4edda;
        }

        p {
            font-size: 18px;
            color: #333;
        }

        .footer {
            margin-top: 48px;
            text-align: center;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="nav-tabs">
            <a href="index.html" id="tab-home">Home</a>
            <a href="available-articles.html" id="tab-articles">Available Articles</a>
            <a href="#" id="tab-3">Activity Log</a>
            <a href="#" id="tab-4">Settings</a>
            <div class="notification-dropdown">
                <span id="notificationBell">🔔</span>
                <div class="dropdown-content" id="notificationBox">No new notifications.</div>
            </div>
        </div>
    </div>
    <div class="container">
        <h1>Welcome to Apexium Article Approval</h1>
        <p>
            Use this portal to approve, edit, or schedule your social posts and manage available articles.
        </p>
        <div class="main-actions">
            <a href="approve-change.html">Approve Changes</a>
            <a href="available-articles.html">Available Articles</a>
        </div>
        <div class="footer">
            &copy; 2025 Apexium.io &mdash; <a href="https://www.apexium.io" target="_blank">www.apexium.io</a>
        </div>
    </div>
    <script>
        // Notification dropdown toggle
        document.getElementById('notificationBell').onclick = function () {
            document.querySelector('.notification-dropdown').classList.toggle('active');
        };

        // Session-persistent notifications
        const notifications = JSON.parse(sessionStorage.getItem('notifications') || '[]');
        function showNotification(message, type = "success") {
            notifications.unshift({
                message,
                type,
                time: new Date().toLocaleTimeString()
            });
            sessionStorage.setItem('notifications', JSON.stringify(notifications));
            renderNotifications();
            document.querySelector('.notification-dropdown').classList.add('active');
            setTimeout(() => {
                document.querySelector('.notification-dropdown').classList.remove('active');
            }, 4000);
        }
        function renderNotifications() {
            const notificationBox = document.getElementById("notificationBox");
            notificationBox.innerHTML = notifications.length ? notifications.map(n =>
                `<div style="color:${n.type === "success" ? "green" : "red"};font-weight:bold;margin-bottom:4px;">
                    ${n.time} ${n.message}
                </div>`
            ).join("") : '<span style="color:#888;">No new notifications.</span>';
        }
        renderNotifications();

        // Highlight active tab
        document.getElementById('tab-home').classList.add('active');
    </script>
</body>

</html>
